// ── Live price ticker bar ─────────────────────────────────────────────────────
function buildTickerBar(prices) {
  var items = Object.values(prices);
  if (!items.length) return;
  var html = '';
  // Duplicate for seamless scroll
  [items, items].forEach(function(arr) {
    arr.forEach(function(p) {
      var chg = parseFloat(p.change_pct);
      var cls = chg >= 0 ? 'up' : 'down';
      var sign = chg >= 0 ? '+' : '';
      html += '<span class="tick-item">';
      html += '<span class="tick-name">' + p.ticker + '</span>';
      html += '<span class="tick-price">$' + p.price.toFixed(2) + '</span>';
      html += '<span class="tick-chg ' + cls + '">' + sign + chg.toFixed(2) + '%</span>';
      html += '</span>';
    });
  });
  document.getElementById('ticker-scroll').innerHTML = html;
  document.getElementById('st-prices').textContent = 'live prices ✓';
  document.getElementById('st-prices').style.color = 'rgba(100,220,150,0.5)';
}

// ── Fetch prices from API ─────────────────────────────────────────────────────
function fetchPrices() {
  fetch('/api/prices')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      LIVE_PRICES = data.prices || {};
      buildTickerBar(LIVE_PRICES);
    })
    .catch(function(e) {
      document.getElementById('st-prices').textContent = 'prices unavailable';
      console.log('Price fetch error:', e);
    });
}

// Fetch on load, then every 15 minutes
fetchPrices();
setInterval(fetchPrices, 15 * 60 * 1000);

function setFilter(cat, btn) {
  FILTER = cat;
  document.querySelectorAll('.flt').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var visible = 0;
  allPinMeshes.forEach(function(o) {

function zoomIn() { targetZ = Math.max(1.2, targetZ - 0.35); updateZoom(); }
function zoomOut() { targetZ = Math.min(5.0, targetZ + 0.35); updateZoom(); }
function updateZoom() { document.getElementById('zoom-label').textContent = (2.9 / targetZ).toFixed(1) + '×'; }

function showPanel(p) {
  var d = p[LANG];
  var tc = TAG_COLORS[d.tg] || 'rgba(100,100,100,0.18);color:#aaa';
  var tag = document.getElementById('panel-tag');
  tag.textContent = d.tg;
  tag.style.cssText = 'background:' + tc + ';font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:4px;font-weight:600';
  document.getElementById('panel-title').textContent = d.n;
  document.getElementById('panel-ticker').textContent = p.tickers.length ? '[ ' + p.tickers.join(' / ') + ' ]' : '';
  document.getElementById('panel-body').textContent = d.b;

  // Static data tags
  var el = document.getElementById('panel-data');
  el.innerHTML = '';
  (d.d || []).forEach(function(x) {
    var s = document.createElement('span');
    s.className = 'dtag';
    s.textContent = x.k + ' ' + x.v;
    el.appendChild(s);
  });

  // Live price tags
  var liveEl = document.getElementById('panel-live');
  liveEl.innerHTML = '';
  p.tickers.forEach(function(ticker) {
    var price = LIVE_PRICES[ticker];
    if (price) {
      var chg = parseFloat(price.change_pct);
      var cls = chg >= 0 ? 'up' : 'down';
      var sign = chg >= 0 ? '+' : '';
      var s = document.createElement('span');
      s.className = 'dtag ' + cls;
      s.textContent = ticker + ' $' + price.price.toFixed(2) + ' (' + sign + chg.toFixed(2) + '%)';
      liveEl.appendChild(s);
    }
  });

  // Impact
  var impEl = document.getElementById('panel-impact');
  if (d.im && d.im.length) {
    var lb = LANG === 'en' ? 'Market Impact' : '市場への影響';
    var html = '<div class="impact-box"><div class="impact-title">' + lb + '</div>';
    d.im.forEach(function(x) { html += '<div class="impact-item">' + x + '</div>'; });
    html += '</div>';
    impEl.innerHTML = html;
  } else {
    impEl.innerHTML = '';
  }

  document.getElementById('panel').style.display = 'block';
}

}

// ── Three.js init ─────────────────────────────────────────────────────────────
(function init() {
  var canvas = document.getElementById('globe');
  var W = window.innerWidth, H = window.innerHeight;
  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 1000);
  camera.position.z = currentZ;
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  var globe = new THREE.Mesh(
    new THREE.SphereGeometry(1, 72, 72),
    new THREE.MeshPhongMaterial({ map: buildMap(), shininess: 6, specular: new THREE.Color(0x0a3020) })
  );
  scene.add(globe);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.05, 32, 32), new THREE.MeshBasicMaterial({ color: 0x0a4030, transparent: true, opacity: 0.04, side: THREE.BackSide })));
  scene.add(new THREE.AmbientLight(0x2a4455, 1.0));
  var sun = new THREE.DirectionalLight(0x99bbcc, 1.2); sun.position.set(5, 3, 5); scene.add(sun);

  PINS.forEach(function(p, i) {
    var pos = latLon(p.la, p.lo, 1.025);
    var sz = p.t === 'stock' ? 0.018 : 0.024;
    var dot = new THREE.Mesh(new THREE.SphereGeometry(sz, 8, 8), new THREE.MeshBasicMaterial({ color: p.c }));
    dot.position.copy(pos); dot.userData = { pin: p, pinType: p.t, isDot: true };
    globe.add(dot); allPinMeshes.push(dot);
    if (p.t !== 'stock') {
      var dir = pos.clone().normalize();
      var ring = new THREE.Mesh(new THREE.RingGeometry(0.03, 0.042, 18), new THREE.MeshBasicMaterial({ color: p.c, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
      ring.position.copy(pos.clone().add(dir.clone().multiplyScalar(0.002)));
      ring.lookAt(pos.clone().multiplyScalar(3));
      ring.userData = { phase: i * 0.55, pinType: p.t };
      globe.add(ring); ringMeshes.push(ring); allPinMeshes.push(ring);
    }
  });

  document.getElementById('st-pins').textContent = PINS.length + ' pins';

  var isDrag = false, prev = { x: 0, y: 0 }, rotY = 0.4, rotX = 0.15, autoRot = true;
  canvas.addEventListener('mousedown', function(e) { isDrag = true; prev = { x: e.clientX, y: e.clientY }; autoRot = false; canvas.classList.add('dragging'); });
  canvas.addEventListener('touchstart', function(e) { isDrag = true; prev = { x: e.touches[0].clientX, y: e.touches[0].clientY }; autoRot = false; }, { passive: true });
  window.addEventListener('mouseup', function() { isDrag = false; canvas.classList.remove('dragging'); });
  window.addEventListener('touchend', function() { isDrag = false; });
  window.addEventListener('mousemove', function(e) { if (!isDrag) return; rotY += (e.clientX - prev.x) * 0.005; rotX += (e.clientY - prev.y) * 0.004; rotX = Math.max(-1.1, Math.min(1.1, rotX)); prev = { x: e.clientX, y: e.clientY }; });
  window.addEventListener('touchmove', function(e) { if (!isDrag) return; rotY += (e.touches[0].clientX - prev.x) * 0.005; rotX += (e.touches[0].clientY - prev.y) * 0.004; rotX = Math.max(-1.1, Math.min(1.1, rotX)); prev = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  canvas.addEventListener('wheel', function(e) { e.preventDefault(); targetZ = Math.max(1.2, Math.min(5.0, targetZ + e.deltaY * 0.004)); updateZoom(); }, { passive: false });

  var lastPinch = null;
  canvas.addEventListener('touchstart', function(e) { if (e.touches.length === 2) lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }, { passive: true });
  canvas.addEventListener('touchmove', function(e) { if (e.touches.length === 2 && lastPinch) { var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); targetZ = Math.max(1.2, Math.min(5.0, targetZ * (lastPinch / d))); lastPinch = d; updateZoom(); } }, { passive: true });

  var raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var clickable = globe.children.filter(function(c) { return c.userData && c.userData.pin && c.visible !== false; });
    var hits = raycaster.intersectObjects(clickable);
    if (hits.length > 0) showPanel(hits[0].object.userData.pin);
  });

  var t = 0;
  (function animate() {
    requestAnimationFrame(animate); t += 0.016;
    if (autoRot) rotY += 0.0012;
    globe.rotation.y = rotY; globe.rotation.x = rotX;
    currentZ += (targetZ - currentZ) * 0.08; camera.position.z = currentZ;
    ringMeshes.forEach(function(r) {
      if (r.visible) { r.material.opacity = 0.1 + 0.22 * Math.abs(Math.sin(t * 1.8 + r.userData.phase)); var s = 1 + 0.1 * Math.abs(Math.sin(t * 1.8 + r.userData.phase)); r.scale.set(s, s, s); }
    });
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', function() { var W2 = window.innerWidth, H2 = window.innerHeight; camera.aspect = W2 / H2; camera.updateProjectionMatrix(); renderer.setSize(W2, H2); });
})();
